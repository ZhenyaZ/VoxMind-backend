services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: loki
      options:
        loki-url: "http://loki-po4wgkwwc0c0kgwwck8g80k4:3100/loki/api/v1/push"
        loki-retries: "5"
        loki-batch-size: "400"
        loki-external-labels: "service=backend,app=voxly,env=production"
        mode: "non-blocking"
        max-size: "10m"
        max-file: "3"